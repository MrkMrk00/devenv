services:
  opencode-meridian:
    container_name: "opencode-meridian"
    restart: unless-stopped
    volumes:
      - claude-config:/mnt/claude
    ports:
      - 3456:3456
    networks:
      - opencode-sandbox
    build:
      context: .
      dockerfile: meridian.Dockerfile
    environment:
      - CLAUDE_PROXY_PASSTHROUGH=1
      - IS_SANDBOX=1

  opencode-tui:
    # No container_name — allows parallel `docker compose run` instances
    tty: true
    stdin_open: true
    networks:
      - opencode-sandbox
    volumes:
      - opencode-config:/home/agent/.config/opencode
      - opencode-data:/home/agent/.local/share/opencode
      - opencode-state:/home/agent/.local/state/opencode
      - ${HOST_CWD:-.}:/home/agent/app
    build:
      context: .
      dockerfile: opencode.Dockerfile
    environment:
      - ANTHROPIC_API_KEY=x
      - ANTHROPIC_BASE_URL=http://opencode-meridian:3456

  grafana-mcp:
    container_name: grafana-mcp
    image: grafana/mcp-grafana
    restart: unless-stopped
    ports:
      - 8000:8000
    networks:
      - opencode-sandbox
    environment:
      - GRAFANA_URL=${GRAFANA_URL}
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN}

volumes:
  claude-config:
  opencode-config:
  opencode-data:
  opencode-state:

networks:
  opencode-sandbox:
    driver: bridge
