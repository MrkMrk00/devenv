- name: Install OpenCode globally
  when: opencode_version is not none
  block:
    - name: Set OpenCode archive name
      ansible.builtin.set_fact:
        opencode_archive: "opencode-linux-{{ (ansible_architecture == 'x86_64') | ternary('x64', 'arm64') }}.tar.gz"

    - name: Check if opencode is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/opencode
      register: opencode_binary

    - name: Provision OpenCode Binary
      when: not opencode_binary.stat.exists
      block:
        - name: Download OpenCode archive
          ansible.builtin.get_url:
            url: "https://github.com/anomalyco/opencode/releases/download/v{{ opencode_version }}/{{ opencode_archive }}"
            dest: "/tmp/{{ opencode_archive }}"
            mode: "0644"

        - name: Verify OpenCode checksum
          ansible.builtin.shell: echo "{{ opencode_checksums }}" | grep '{{ opencode_archive }}' | sha256sum -c
          args:
            chdir: /tmp

        - name: Extract binary directly to /usr/local/bin
          become: true
          ansible.builtin.unarchive:
            src: "/tmp/{{ opencode_archive }}"
            dest: /usr/local/bin
            remote_src: true
            extra_opts:
              - "opencode"
            creates: /usr/local/bin/opencode

        - name: Ensure correct permissions and ownership
          become: true
          ansible.builtin.file:
            path: /usr/local/bin/opencode
            owner: root
            group: root
            mode: "0755"

        - name: Cleanup temporary archive
          ansible.builtin.file:
            path: "/tmp/{{ opencode_archive }}"
            state: absent
