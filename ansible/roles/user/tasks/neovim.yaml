- name: Install Neovim
  when: nvim_version is not none
  block:
    - name: Set Neovim archive name
      ansible.builtin.set_fact:
        nvim_archive: "nvim-linux-{{ ansible_architecture }}.tar.gz"

    - name: Check if nvim is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/nvim
      register: nvim_binary

    - name: Provision Neovim
      when: not nvim_binary.stat.exists
      block:
        - name: Download Neovim archive
          ansible.builtin.get_url:
            url: "https://github.com/neovim/neovim/releases/download/v{{ nvim_version }}/{{ nvim_archive }}"
            dest: "/tmp/{{ nvim_archive }}"
            mode: "0644"

        - name: Verify Neovim checksum
          ansible.builtin.shell: echo "{{ nvim_checksums }}" | grep '{{ nvim_archive }}' | sha256sum -c
          args:
            chdir: /tmp

        - name: Extract Neovim to /usr/local
          become: true
          ansible.builtin.unarchive:
            src: "/tmp/{{ nvim_archive }}"
            dest: /usr/local
            remote_src: true
            extra_opts:
              - "--strip-components=1"

        - name: Cleanup temporary archive
          ansible.builtin.file:
            path: "/tmp/{{ nvim_archive }}"
            state: absent
