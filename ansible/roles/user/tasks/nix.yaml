- name: Install Nix package manager
  when: nix_install | default(false)
  block:
    - name: Check if Nix is already installed
      ansible.builtin.stat:
        path: /nix
      register: nix_dir

    - name: Provision Nix
      when: not nix_dir.stat.exists
      block:
        - name: Download and run the Nix installer
          ansible.builtin.shell: >
            sh <(curl -L https://nixos.org/nix/install) --daemon --yes
          args:
            executable: /bin/bash
            creates: /nix

        - name: Ensure /etc/nix directory exists
          become: true
          ansible.builtin.file:
            path: /etc/nix
            state: directory
            mode: "0755"

        - name: Enable Nix experimental features (flakes)
          become: true
          ansible.builtin.copy:
            dest: /etc/nix/nix.conf
            content: "experimental-features = nix-command flakes\n"
            mode: "0644"
