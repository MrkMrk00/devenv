- name: Set architecture label for k8s tools
  ansible.builtin.set_fact:
    k8s_arch: "{{ (ansible_architecture == 'x86_64') | ternary('amd64', 'arm64') }}"

- name: Ensure /usr/local/bin exists
  become: true
  ansible.builtin.file:
    path: /usr/local/bin
    state: directory
    mode: "0755"

# -- kubectl -----------------------------------------------------------
- name: Install kubectl
  when: kubectl_version is not none
  become: true
  block:
    - name: Set kubectl checksum filename
      ansible.builtin.set_fact:
        kubectl_file: "kubectl-{{ k8s_arch }}"

    - name: Download kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/{{ k8s_arch }}/kubectl"
        dest: "/tmp/{{ kubectl_file }}"
        mode: "0644"

    - name: Verify kubectl checksum
      ansible.builtin.shell: echo "{{ kubectl_checksums }}" | grep '{{ kubectl_file }}' | sha256sum -c
      args:
        chdir: /tmp

    - name: Install kubectl binary
      ansible.builtin.copy:
        src: "/tmp/{{ kubectl_file }}"
        dest: /usr/local/bin/kubectl
        mode: "0755"
        remote_src: true

    - name: Cleanup kubectl download
      ansible.builtin.file:
        path: "/tmp/{{ kubectl_file }}"
        state: absent

# -- kustomize ---------------------------------------------------------
- name: Install kustomize
  when: kustomize_version is not none
  become: true
  block:
    - name: Set kustomize archive name
      ansible.builtin.set_fact:
        kustomize_archive: "kustomize_v{{ kustomize_version }}_linux_{{ k8s_arch }}.tar.gz"

    - name: Download kustomize
      ansible.builtin.get_url:
        url: "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv{{ kustomize_version }}/{{ kustomize_archive }}"
        dest: "/tmp/{{ kustomize_archive }}"
        mode: "0644"

    - name: Verify kustomize checksum
      ansible.builtin.shell: echo "{{ kustomize_checksums }}" | grep '{{ kustomize_archive }}' | sha256sum -c
      args:
        chdir: /tmp

    - name: Unarchive kustomize
      ansible.builtin.unarchive:
        src: "/tmp/{{ kustomize_archive }}"
        dest: /usr/local/bin/
        remote_src: true

    - name: Cleanup kustomize archive
      ansible.builtin.file:
        path: "/tmp/{{ kustomize_archive }}"
        state: absent

# -- Helm --------------------------------------------------------------
- name: Install Helm
  when: helm_version is not none
  become: true
  block:
    - name: Set Helm archive name
      ansible.builtin.set_fact:
        helm_archive: "helm-v{{ helm_version }}-linux-{{ k8s_arch }}.tar.gz"

    - name: Download Helm
      ansible.builtin.get_url:
        url: "https://get.helm.sh/{{ helm_archive }}"
        dest: "/tmp/{{ helm_archive }}"
        mode: "0644"

    - name: Verify Helm checksum
      ansible.builtin.shell: echo "{{ helm_checksums }}" | grep '{{ helm_archive }}' | sha256sum -c
      args:
        chdir: /tmp

    - name: Unarchive Helm
      ansible.builtin.unarchive:
        src: "/tmp/{{ helm_archive }}"
        dest: /tmp/
        remote_src: true

    - name: Move Helm binary to path
      ansible.builtin.copy:
        src: "/tmp/linux-{{ k8s_arch }}/helm"
        dest: /usr/local/bin/helm
        mode: "0755"
        remote_src: true

    - name: Cleanup Helm archive and extracted dir
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/{{ helm_archive }}"
        - "/tmp/linux-{{ k8s_arch }}"

# -- helmfile ----------------------------------------------------------
- name: Install helmfile
  when: helmfile_version is not none
  become: true
  block:
    - name: Set helmfile archive name
      ansible.builtin.set_fact:
        helmfile_archive: "helmfile_{{ helmfile_version }}_linux_{{ k8s_arch }}.tar.gz"

    - name: Download helmfile
      ansible.builtin.get_url:
        url: "https://github.com/helmfile/helmfile/releases/download/v{{ helmfile_version }}/{{ helmfile_archive }}"
        dest: "/tmp/{{ helmfile_archive }}"
        mode: "0644"

    - name: Verify helmfile checksum
      ansible.builtin.shell: echo "{{ helmfile_checksums }}" | grep '{{ helmfile_archive }}' | sha256sum -c
      args:
        chdir: /tmp

    - name: Unarchive helmfile
      ansible.builtin.unarchive:
        src: "/tmp/{{ helmfile_archive }}"
        dest: /usr/local/bin/
        remote_src: true

    - name: Cleanup helmfile archive
      ansible.builtin.file:
        path: "/tmp/{{ helmfile_archive }}"
        state: absent

# -- K3d (K3s in Docker) -----------------------------------------------
- name: Install K3d
  when: k3d_version is not none
  become: true
  block:
    - name: Set K3d binary name
      ansible.builtin.set_fact:
        k3d_file: "k3d-linux-{{ k8s_arch }}"

    - name: Download K3d
      ansible.builtin.get_url:
        url: "https://github.com/k3d-io/k3d/releases/download/v{{ k3d_version }}/{{ k3d_file }}"
        dest: "/tmp/{{ k3d_file }}"
        mode: "0644"

    - name: Verify K3d checksum
      ansible.builtin.shell: echo "{{ k3d_checksums }}" | grep '{{ k3d_file }}' | sha256sum -c
      args:
        chdir: /tmp

    - name: Install K3d binary
      ansible.builtin.copy:
        src: "/tmp/{{ k3d_file }}"
        dest: /usr/local/bin/k3d
        mode: "0755"
        remote_src: true

    - name: Cleanup K3d download
      ansible.builtin.file:
        path: "/tmp/{{ k3d_file }}"
        state: absent
