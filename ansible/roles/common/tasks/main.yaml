- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: yes

- name: Install basic packages
  ansible.builtin.apt:
    name:
      - git
      - curl
      - vim
      - python3
      - python3-pip
      - ca-certificates
      - curl
    state: present
