images: []
cpus: 8
memory: "16GiB"
# "100GiB"
disk: null

mounts: []

ssh:
  loadDotSSHPubKeys: false
  forwardAgent: false
  forwardX11: false
  forwardX11Trusted: false
  overVsock: null

upgradePackages: true

containerd:
  system: false
  user: false

provision:
