  - mode: system
    script: |
      #!/bin/bash
      set -euxo pipefail
      export DEBIAN_FRONTEND=noninteractive

      apt-get update
      apt-get install --no-install-recommends -y \
        git stow curl vim ca-certificates sudo xz-utils unzip

